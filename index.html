<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>River Jump</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">River Jump</div>
      <div class="score" id="score">0 m</div>
      <div class="best" id="best">Best 0 m</div>
    </header>

    <section class="game-wrap" id="gameWrap" aria-label="River Jump oyunu">
      <canvas id="game" width="480" height="760"></canvas>
      <div class="overlay" id="overlay">
        <div class="panel">
          <h1 id="title">River Jump</h1>
          <p id="message">Kurbagayi saga sola yonlendir. Ustten ziplarsan timsah kirilir, alttan carparsan oyun biter. En tepeye ulas ve kazan.</p>
          <div class="actions">
            <button id="start">Basla</button>
            <button class="secondary" id="how">Kontroller</button>
          </div>
        </div>
      </div>
    </section>

    <nav class="controls" aria-label="Dokunmatik kontroller">
      <button class="pad" id="left" aria-label="Sola git">&larr;</button>
      <button class="pad" id="right" aria-label="Saga git">&rarr;</button>
    </nav>
  </main>

  <script src="game.js"></script>
</body>
</html>
